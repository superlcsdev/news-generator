name: "LP — News Post"

on:
  schedule:
    - cron: '0 3 * * 6'   # Saturday 11AM SGT
  workflow_dispatch:
    inputs:
      dry_run:
        description: 'Dry run'
        default: 'false'
        type: choice
        options: ['false', 'true']

jobs:
  news:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with: { python-version: '3.11' }
      - run: pip install -r requirements.txt
      - name: Fetch, reframe, post news
        env:
          GEMINI_API_KEY:          ${{ secrets.GEMINI_API_KEY }}
          OPENROUTER_API_KEY:      ${{ secrets.OPENROUTER_API_KEY }}
          FB_LP_PAGE_ID:           ${{ secrets.FB_LP_PAGE_ID }}
          FB_LP_PAGE_ACCESS_TOKEN: ${{ secrets.FB_LP_PAGE_ACCESS_TOKEN }}
          HF_API_TOKEN:            ${{ secrets.HF_API_TOKEN }}
          DRY_RUN:                 ${{ github.event.inputs.dry_run || 'false' }}
        run: |
          cd lp
          if [ "$DRY_RUN" = "true" ]; then
            python lp_main.py --type news --dry-run
          else
            python lp_main.py --type news
          fi
      - name: Save LP post history
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: lp-post-history
          path: lp_post_history.json
          if-no-files-found: ignore
