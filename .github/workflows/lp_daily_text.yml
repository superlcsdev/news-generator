name: "LP — Daily Text Post"

on:
  schedule:
    - cron: '0 12 * * 1'   # Monday 8PM SGT
    - cron: '0 12 * * 4'   # Thursday 8PM SGT
  workflow_dispatch:
    inputs:
      post_format:
        description: 'Format: TRUTH / REFRAME / IDENTITY / QUESTION / any'
        default: 'any'
      dry_run:
        description: 'Dry run (no FB post)'
        default: 'false'
        type: choice
        options: ['false', 'true']

jobs:
  post:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with: { python-version: '3.11' }
      - run: pip install -r requirements.txt
      - name: Generate and post
        env:
          GEMINI_API_KEY:           ${{ secrets.GEMINI_API_KEY }}
          OPENROUTER_API_KEY:       ${{ secrets.OPENROUTER_API_KEY }}
          FB_LP_PAGE_ID:            ${{ secrets.FB_LP_PAGE_ID }}
          FB_LP_PAGE_ACCESS_TOKEN:  ${{ secrets.FB_LP_PAGE_ACCESS_TOKEN }}
          HF_API_TOKEN:             ${{ secrets.HF_API_TOKEN }}
          POST_FORMAT:              ${{ github.event.inputs.post_format || 'any' }}
          DRY_RUN:                  ${{ github.event.inputs.dry_run || 'false' }}
        run: |
          cd lp
          if [ "$DRY_RUN" = "true" ]; then
            python lp_main.py --type text --format "$POST_FORMAT" --dry-run
          else
            python lp_main.py --type text --format "$POST_FORMAT"
          fi
