name: "LP — Bi-weekly CTA"

on:
  schedule:
    - cron: '0 11 * * 0'
  workflow_dispatch:
    inputs:
      dry_run:
        description: 'Dry run'
        default: 'false'
        type: choice
        options: ['false', 'true']

jobs:
  cta:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with: { python-version: '3.11' }
      - run: pip install -r requirements.txt
      - name: Post CTA
        env:
          FB_LP_PAGE_ID:           ${{ secrets.FB_LP_PAGE_ID }}
          FB_LP_PAGE_ACCESS_TOKEN: ${{ secrets.FB_LP_PAGE_ACCESS_TOKEN }}
          DRY_RUN:                 ${{ github.event.inputs.dry_run || 'false' }}
        run: |
          cd lp
          if [ "$DRY_RUN" = "true" ]; then
            python lp_main.py --type cta --dry-run
          else
            python lp_main.py --type cta
          fi
